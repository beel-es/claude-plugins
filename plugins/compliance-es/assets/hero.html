<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1280px; height:640px; }
  body{
    font-family:"DM Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:#FDFCFA; color:#1C1C1F; width:1280px; height:640px; position:relative; overflow:hidden;
  }
  /* toque de marca: leve halo miel arriba-derecha, muy sutil */
  .halo{ position:absolute; width:560px; height:560px; right:-160px; top:-200px;
    background:radial-gradient(circle, rgba(184,132,43,.10), transparent 62%); }
  .wrap{ position:absolute; inset:0; padding:84px 90px; display:flex; flex-direction:column; justify-content:center; }
  .top{ display:flex; align-items:center; gap:20px; margin-bottom:34px; }
  .icon{ width:74px; height:74px; border-radius:18px; box-shadow:0 10px 30px -8px rgba(34,77,169,.45); }
  .kick{ display:flex; align-items:center; gap:13px; font-size:21px; letter-spacing:3px;
    text-transform:uppercase; color:#8A92A8; font-weight:700; }
  .kick .flag{ width:40px; height:27px; border-radius:5px; overflow:hidden; position:relative;
    box-shadow:0 3px 9px rgba(0,0,0,.18); }
  .kick .flag .r{ position:absolute; left:0; right:0; height:25%; background:#c60b1e; }
  .kick .flag .r.t{ top:0 } .kick .flag .r.b{ bottom:0 }
  .kick .flag .y{ position:absolute; top:25%; left:0; right:0; height:50%; background:#ffc400; }
  .kick b{ color:#1C1C1F; }
  h1{ font-size:118px; font-weight:800; letter-spacing:-3.5px; line-height:.95; color:#1C1C1F; }
  h1 .es{ color:#224DA9; }
  .tag{ font-size:38px; color:#34343B; margin-top:30px; max-width:1020px; line-height:1.2; font-weight:700; }
  .sub{ font-size:25px; color:#5A6580; margin-top:15px; max-width:980px; line-height:1.3; font-weight:500; }
  .foot{ position:absolute; left:90px; bottom:52px; font-size:21px; color:#8A92A8; font-weight:500; }
  .foot b{ color:#224DA9; font-weight:700; }
  .base{ position:absolute; left:0; right:0; bottom:0; height:7px;
    background:linear-gradient(90deg,#224DA9 0 70%,#B8842B 70% 100%); }
</style>
</head>
<body>
  <div class="halo"></div>
  <div class="wrap">
    <div class="top">
      <img class="icon" src="beel-icon.svg" alt="BeeL">
      <span class="kick">
        <span class="flag"><span class="r t"></span><span class="y"></span><span class="r b"></span></span>
        Cumplimiento legal · <b>España</b>
      </span>
    </div>
    <h1>compliance<span class="es">-es</span></h1>
    <div class="tag">Audita tu app y deja listos tus documentos de cumplimiento.</div>
    <div class="sub">Cada hallazgo apunta al artículo de la norma que lo respalda — sin abogado.</div>
  </div>
  <div class="foot">Un plugin de <b>BeeL.</b> para Claude Code · github.com/beel-es/claude-plugins</div>
  <div class="base"></div>
</body>
</html>
