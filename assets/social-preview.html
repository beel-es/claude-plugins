<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1280px; height:640px; }
  body{
    font-family:"DM Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:#FDFCFA; color:#1C1C1F; width:1280px; height:640px; position:relative; overflow:hidden;
  }
  .halo{ position:absolute; width:580px; height:580px; right:-170px; top:-210px;
    background:radial-gradient(circle, rgba(184,132,43,.10), transparent 62%); }
  .halo2{ position:absolute; width:520px; height:520px; left:-200px; bottom:-240px;
    background:radial-gradient(circle, rgba(34,77,169,.08), transparent 64%); }
  .wrap{ position:absolute; inset:0; padding:84px 90px; display:flex; flex-direction:column; justify-content:center; }
  .brand{ display:flex; align-items:center; gap:18px; margin-bottom:30px; }
  .brand img{ height:60px; }
  .brand .div{ width:1px; height:42px; background:#D4DAE7; }
  .brand .kick{ font-size:20px; letter-spacing:3px; text-transform:uppercase; color:#8A92A8; font-weight:700; line-height:1.25; }
  .brand .kick b{ color:#1C1C1F; }
  h1{ font-size:110px; font-weight:800; letter-spacing:-3.5px; line-height:.95; color:#1C1C1F; }
  h1 .b{ color:#224DA9; }
  .sub{ font-size:31px; color:#34343B; margin-top:26px; max-width:1060px; line-height:1.28; font-weight:600; }
  .chips{ display:flex; gap:13px; margin-top:36px; align-items:center; }
  .chip{ font-family:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace; font-size:23px;
    padding:11px 20px; border-radius:12px; background:#fff; border:1px solid #E5E9F2; color:#224DA9; font-weight:600;
    box-shadow:0 2px 8px -4px rgba(28,28,31,.12); }
  .foot{ position:absolute; left:90px; bottom:50px; font-size:21px; color:#8A92A8; font-weight:500; }
  .foot b{ color:#224DA9; font-weight:700; }
  .base{ position:absolute; left:0; right:0; bottom:0; height:7px;
    background:linear-gradient(90deg,#224DA9 0 70%,#B8842B 70% 100%); }
</style>
</head>
<body>
  <div class="halo"></div>
  <div class="halo2"></div>
  <div class="wrap">
    <div class="brand">
      <img src="beel-wordmark.svg" alt="BeeL.">
      <span class="div"></span>
      <span class="kick">Plugins oficiales<br>para <b>Claude Code</b></span>
    </div>
    <h1>claude<span class="b">-plugins</span></h1>
    <div class="sub">Facturación con la API de BeeL., auditoría de Stripe y cumplimiento legal en España — desde la terminal.</div>
    <div class="chips">
      <span class="chip">beel-api</span>
      <span class="chip">stripe</span>
      <span class="chip">compliance-es</span>
    </div>
  </div>
  <div class="foot">github.com/beel-es/claude-plugins · <b>BeeL.</b></div>
  <div class="base"></div>
</body>
</html>
